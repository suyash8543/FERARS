services:
  - type: web
    name: ferars-backend
    env: python
    plan: standard
    buildCommand: "pip install -r requirements.txt && python backend/setup_database.py"
    startCommand: "gunicorn backend.server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
      - key: PYTHONUNBUFFERED
        value: "1"
