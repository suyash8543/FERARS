<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>Facial Expression Recognition</title>
    <style>
        #video {
            transform: scaleX(-1);
            background: #000;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Facial Expression Recognition</h2>
        
        <div class="video-container">
            <video id="video" width="640" height="480" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <div class="capbutt">
            <button id="capture-button" class="rounded-button">
                <img src="{{ url_for('static', filename='camera-icon.png') }}" alt="Camera Icon" class="button-icon"> 
                Capture Image
            </button>
        </div>

        <div id="result" style="margin-top: 20px;">
            <h3>Emotion: <span id="emotion">-</span></h3>
            <table id="recommendations-table" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr>
                        <th style="border: 1px solid #ccc; padding: 8px;">Recommendation</th>
                        <th style="border: 1px solid #ccc; padding: 8px;">Category</th>
                    </tr>
                </thead>
                <tbody id="recommendations-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Access user's webcam
        async function startVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480 }
                });
                document.getElementById('video').srcObject = stream;
            } catch (error) {
                console.error('Error accessing webcam:', error);
                alert('Please allow camera access to use this app');
            }
        }

        // Start video on page load
        window.addEventListener('DOMContentLoaded', startVideo);

        // Capture frame from video and send to backend
        document.getElementById('capture-button').onclick = function() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Draw video frame to canvas
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convert canvas to blob and send to backend
            canvas.toBlob(function(blob) {
                const formData = new FormData();
                formData.append('image', blob);
                
                fetch('/process_image', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        alert('Error: ' + data.error);
                        return;
                    }
                    
                    console.log(data);
                    document.getElementById('emotion').innerText = data.emotion;
                    const recommendationsBody = document.getElementById('recommendations-body');
                    recommendationsBody.innerHTML = '';
                
                    if (data.recommendations.length === 0) {
                        recommendationsBody.innerHTML = '<tr><td colspan="2">No recommendations available.</td></tr>';
                        return;
                    }
                
                    data.recommendations.forEach(item => {
                        const row = document.createElement('tr');
                        row.innerHTML = `<td style="border: 1px solid #ccc; padding: 8px;">${item[0]}</td>
                                         <td style="border: 1px solid #ccc; padding: 8px;">${item[1]}</td>`;
                        recommendationsBody.appendChild(row);
                    });
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error processing image');
                });
            });
        };
    </script>
</body>
</html>
